<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>AulaPeque - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">

  <div class="login-container">

    <div class="logo-area">
      <div class="logo-circle">🌈</div>
      <h1>AulaPeque</h1>
      <p>Gestión pedagógica para educación parvularia</p>
    </div>

    <h2>Iniciar sesión</h2>

    <form id="formLogin">
      <input
        type="email"
        id="correo"
        placeholder="Correo electrónico"
        required>

      <input
        type="password"
        id="password"
        placeholder="Contraseña"
        required>

      <button type="submit">
        Ingresar
      </button>
    </form>

    <p class="texto-registro">
      ¿No tienes una cuenta?
      <a href="registro.html">Crear una cuenta</a>
    </p>

  </div>

  <script src="js/login.js"></script>
</body>
</html>
